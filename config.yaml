# ──────────────────────────────────────────────────────────────────────────────
# BruteForce Detector — konfiguracja
# ──────────────────────────────────────────────────────────────────────────────

detection:
  threshold: 5                 # number of failed logins triggering an alert
  time_window: 60              # time window (seconds)
  alert_cooldown: 300          # cooldown between alerts for the same IP (seconds)
  success_failure_threshold: 3 # min failures before a success counts as a breach
  spray_username_threshold: 8  # unique accounts from one IP = password spray alert
  action_on_threat_intel_match: block  # block / alert_only — overrides blocker for TI-matched IPs

log_files:
  - path: /var/log/auth.log    # Debian / Ubuntu
    type: linux_ssh
    enabled: true

  # - path: /var/log/secure    # RHEL / CentOS / Fedora
  #   type: linux_ssh
  #   enabled: true

  # - path: /sciezka/do/Security.evtx   # plik Windows Event Log
  #   type: windows_evtx
  #   enabled: false

discord:
  enabled: false
  webhook_url: ""   # https://discord.com/api/webhooks/ID/TOKEN

slack:
  enabled: false
  webhook_url: ""   # https://hooks.slack.com/services/T.../B.../...

# ── Central Syslog receiver ───────────────────────────────────────────────────
# Collects auth logs from remote machines (SSH, xRDP) over the network.
# Remote servers forward via rsyslog / syslog-ng — no agent needed.
#
# rsyslog snippet (on each remote machine):
#   *.auth    @brutus-server:5514      # UDP (one @)
#   *.auth    @@brutus-server:5514     # TCP (two @@)
#
# Note: port 514 requires root or CAP_NET_BIND_SERVICE.
#       Port 5514 works without root privileges.
syslog:
  enabled: false
  host: "0.0.0.0"      # bind address; use "127.0.0.1" for local-only
  port: 5514
  protocol: udp          # udp | tcp
  parser: linux_ssh      # parser for incoming messages

geo:
  enabled: true
  cache_ttl: 3600
  timeout: 5
  # mmdb_path: /path/to/GeoLite2-City.mmdb   # offline mode (requires: pip install geoip2)

blocker:
  enabled: false              # requires root / sudo
  auto_unblock_after: 3600    # seconds; 0 = permanent until restart
  state_file: reports/blocked_ips.json
  dry_run: false              # true = log only, no real iptables rules

whitelist:
  - "127.0.0.1"
  - "::1"
  # - "192.168.1.0/24"

reports:
  save_to_file: true
  output_path: reports/alerts.jsonl

logging:
  level: INFO
  # file: logs/detector.log

# ── Offline IP reputation / Threat Intelligence ──────────────────────────────
# Free public blocklists — no API key, no account required.
# Step 1: python main.py --update-threat-db   (downloads ~50k bad IPs/CIDRs)
# Step 2: set enabled: true
threat_intel:
  enabled: false
  db_path: reports/threat_intel.txt
  auto_update: false            # refresh DB automatically every update_interval
  update_interval: 86400        # seconds between auto-updates (default: 24 h)
  timeout: 15                   # HTTP request timeout per source (seconds)
  sources:                    # leave empty to use all 5 built-in sources; swap URLs as needed
    - "https://www.spamhaus.org/drop/drop.txt"
    - "https://www.spamhaus.org/drop/edrop.txt"
    - "https://iplists.firehol.org/files/firehol_level1.netset"
    - "https://lists.blocklist.de/lists/ssh.txt"
    - "https://cinsscore.com/list/ci-badguys.txt"
    - "https://rules.emergingthreats.net/fwrules/emerging-Block-IPs.txt"
